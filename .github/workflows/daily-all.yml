name: Daily Multi-Project Update

on:
  schedule:
    - cron: '20 2 * * *'
    - cron: '50 8 * * *'
    - cron: '15 15 * * *'
    - cron: '0 5 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Configure Git
        run: |
          git config user.name "Kousik-Automation"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Run Updates
        run: |

          DAY=$(date -u +%u)
          HOUR=$(date -u +%H)
          DATE=$(date '+%Y-%m-%d')
          TIME=$(date '+%H:%M')

          update_all() {

          echo "Updating stock tracker"

          mkdir -p stock-tracker anime-log tech-news blog-draft

          # -------------------------
          # Indian Stocks (Yahoo API)
          # -------------------------

          STOCK_JSON=$(curl -s "https://query1.finance.yahoo.com/v7/finance/quote?symbols=RELIANCE.NS,TCS.NS,INFY.NS,HDFCBANK.NS,ICICIBANK.NS")

          RELIANCE=$(echo $STOCK_JSON | jq '.quoteResponse.result[] | select(.symbol=="RELIANCE.NS") | .regularMarketPrice')
          TCS=$(echo $STOCK_JSON | jq '.quoteResponse.result[] | select(.symbol=="TCS.NS") | .regularMarketPrice')
          INFY=$(echo $STOCK_JSON | jq '.quoteResponse.result[] | select(.symbol=="INFY.NS") | .regularMarketPrice')
          HDFC=$(echo $STOCK_JSON | jq '.quoteResponse.result[] | select(.symbol=="HDFCBANK.NS") | .regularMarketPrice')
          ICICI=$(echo $STOCK_JSON | jq '.quoteResponse.result[] | select(.symbol=="ICICIBANK.NS") | .regularMarketPrice')

          # -------------------------
          # Crypto Prices
          # -------------------------

          CRYPTO=$(curl -s "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd")

          BTC=$(echo $CRYPTO | jq '.bitcoin.usd')
          ETH=$(echo $CRYPTO | jq '.ethereum.usd')

          # -------------------------
          # Gold Price
          # -------------------------

          GOLD=$(curl -s https://api.metals.live/v1/spot/gold | jq '.[0].price')

          ENTRY="{\"date\":\"$DATE\",\"time\":\"$TIME\",\"reliance\":$RELIANCE,\"tcs\":$TCS,\"infosys\":$INFY,\"hdfc_bank\":$HDFC,\"icici_bank\":$ICICI,\"bitcoin_usd\":$BTC,\"ethereum_usd\":$ETH,\"gold_usd\":$GOLD}"

          if [ ! -f stock-tracker/data.json ]; then
            echo "[]" > stock-tracker/data.json
          fi

          jq --argjson entry "$ENTRY" '. += [$entry]' stock-tracker/data.json > tmp.json && mv tmp.json stock-tracker/data.json


          # -------------------------
          # Anime Quote API
          # -------------------------

          QUOTE_JSON=$(curl -sf https://api.animechan.io/v1/quotes/random || echo '{}')

          QUOTE=$(echo "$QUOTE_JSON" | jq -r '.quote')
          CHARACTER=$(echo "$QUOTE_JSON" | jq -r '.character')
          ANIME=$(echo "$QUOTE_JSON" | jq -r '.anime')

          echo -e "\n## $DATE ($TIME)\n> \"$QUOTE\"\n— $CHARACTER ($ANIME)" >> anime-log/quotes.md


          # -------------------------
          # Tech News (HackerNews)
          # -------------------------

          HN_ID=$(curl -s https://hacker-news.firebaseio.com/v0/topstories.json | jq '.[0]')

          HN_JSON=$(curl -s https://hacker-news.firebaseio.com/v0/item/$HN_ID.json)

          TITLE=$(echo "$HN_JSON" | jq -r '.title')
          URL=$(echo "$HN_JSON" | jq -r '.url')

          echo -e "\n## $DATE ($TIME)\n- $TITLE\n$URL" >> tech-news/news.md


          # -------------------------
          # Java Tip (StackOverflow)
          # -------------------------

          JAVA_POST=$(curl -s https://stackoverflow.com/feeds/tag?tagnames=java \
          | grep -oP '(?<=<title>).*?(?=</title>)' \
          | sed -n '2p')

          echo -e "\n## $DATE ($TIME)\n$JAVA_POST" >> blog-draft/java-tips.md

          }

          # Weekly burst
          if [ "$DAY" = "6" ] && [ "$HOUR" -lt 7 ]; then

            for i in 1 2 3 4; do
              update_all
              git add .
              git commit -m "Weekly content update: $DATE ($i)" || true
            done

            git push
            exit 0
          fi


          # Random skip for natural commits
          ROLL=$((RANDOM % 100))

          if [ "$ROLL" -lt 30 ]; then
            echo "Skipping this slot"
            exit 0
          fi


          update_all

          git add .

          git commit -m "Daily update: $DATE" || exit 0

          git push
