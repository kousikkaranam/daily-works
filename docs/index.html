<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DailyWorks Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box}

:root{
--bg:#06080d;
--surface:rgba(16,18,26,.7);
--border:#222938;
--accent:#3b82f6;
--purple:#a78bfa;
--orange:#f59e0b;
--green:#22c55e;
--text:#eaf0f6;
--muted:#94a3b8;
}

body{
font-family:Inter;
background:var(--bg);
color:var(--text);
min-height:100vh;
overflow-x:hidden;
}

/* background glow */

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, rgba(59,130,246,.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(167,139,250,.12), transparent 40%);
animation:move 18s ease-in-out infinite alternate;
z-index:0;
}

@keyframes move{
0%{transform:scale(1)}
100%{transform:scale(1.2)}
}

/* grid */

body::after{
content:"";
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
background-size:40px 40px;
z-index:0;
}

.app{
position:relative;
z-index:1;
max-width:1200px;
margin:auto;
padding:20px;
}

/* header */

.header{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
padding:30px 0;
border-bottom:1px solid var(--border);
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo-icon{
width:42px;
height:42px;
border-radius:10px;
background:linear-gradient(135deg,var(--accent),var(--purple));
display:flex;
align-items:center;
justify-content:center;
font-family:JetBrains Mono;
font-weight:700;
}

.logo span{color:var(--accent)}

.meta{
font-size:12px;
color:var(--muted);
}

/* cards */

.grid{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:14px;
}

.card{
background:var(--surface);
border:1px solid var(--border);
border-radius:16px;
padding:20px;
backdrop-filter:blur(12px);
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 40px rgba(0,0,0,.6);
border-color:#2e3a50;
}

.card h3{
font-size:13px;
color:var(--muted);
margin-bottom:8px;
}

.price{
font-family:JetBrains Mono;
font-size:20px;
}

/* chart */

.chart{
height:50px;
margin-top:10px;
}

/* tabs — pill toggle */


.toggle-wrapper{
display:flex;
justify-content:center;
margin-top:30px;
}

.toggle{
position:relative;
display:flex;
padding:6px;
gap:6px;
border-radius:18px;

background:
linear-gradient(
180deg,
rgba(255,255,255,0.04),
rgba(255,255,255,0.01)
);

border:1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(16px);

box-shadow:
0 10px 30px rgba(0,0,0,.45),
inset 0 1px 0 rgba(255,255,255,.04);
}

.toggle-item{
position:relative;
display:flex;
align-items:center;
gap:8px;

padding:12px 26px;

border:none;
background:transparent;

border-radius:14px;

font-size:14px;
font-weight:600;

color:var(--muted);
cursor:pointer;

transition:
color .25s ease,
transform .2s ease;
}

.toggle-item:hover{
color:var(--text);
transform:translateY(-1px);
}

.toggle-item.active{
color:#fff;
}

.toggle-highlight{
position:absolute;

top:6px;
bottom:6px;

border-radius:14px;

background:
linear-gradient(
135deg,
rgba(59,130,246,.35),
rgba(167,139,250,.25)
);

border:1px solid rgba(59,130,246,.35);

box-shadow:
0 0 20px rgba(59,130,246,.2),
inset 0 1px 0 rgba(255,255,255,.08);

transition:
left .35s cubic-bezier(.4,0,.2,1),
width .35s cubic-bezier(.4,0,.2,1);

z-index:0;
}

.toggle-item span{
position:relative;
z-index:1;
}

.icon{
font-size:15px;
opacity:.9;
}
.toggle-item.active{
color:white;
text-shadow:0 0 10px rgba(59,130,246,.4);
}

.tabs-wrap{
margin-top:40px;
display:flex;
justify-content:center;
}

.tabs{
display:flex;
background:rgba(16,18,26,.8);
border:1px solid var(--border);
border-radius:16px;
padding:5px;
gap:4px;
backdrop-filter:blur(12px);
position:relative;
}

.tab{
padding:12px 28px;
cursor:pointer;
color:var(--muted);
font-size:14px;
font-weight:600;
border-radius:12px;
transition:color .25s;
display:flex;
align-items:center;
gap:8px;
user-select:none;
position:relative;
z-index:1;
}

.tab:hover{
color:var(--text);
}

.tab.active{
color:#fff;
}

.tab-slider{
position:absolute;
top:5px;
height:calc(100% - 10px);
border-radius:12px;
background:linear-gradient(135deg,rgba(59,130,246,.25),rgba(167,139,250,.2));
border:1px solid rgba(59,130,246,.3);
box-shadow:0 0 20px rgba(59,130,246,.15);
transition:all .3s cubic-bezier(.4,0,.2,1);
z-index:0;
}

.tab-icon{
font-size:15px;
}

/* views (investment vs content) */

.view{
display:none;
}

.view.active{
display:block;
animation:fadeIn .35s ease-out;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* sections */

.section{
display:none;
padding:30px 0;
}

.section.active{
display:block;
animation:fadeIn .3s ease-out;
}

/* quote */

.quote{
background:var(--surface);
border:1px solid var(--border);
padding:40px;
border-radius:20px;
text-align:center;
font-size:20px;
font-style:italic;
line-height:1.6;
}

.attr{
margin-top:16px;
color:var(--purple);
font-size:14px;
}

/* news */

.news{
display:flex;
flex-direction:column;
gap:12px;
}

.news-item{
background:var(--surface);
border:1px solid var(--border);
border-radius:14px;
padding:16px;
display:flex;
justify-content:space-between;
transition:.2s;
}

.news-item:hover{
transform:translateY(-3px);
border-color:#2f3b50;
}

/* java tip */

.tip{
background:var(--surface);
border:1px solid var(--border);
border-radius:18px;
padding:30px;
font-family:JetBrains Mono;
line-height:1.7;
}

</style>
</head>

<body>

<div class="app">

<div class="header">

<div class="logo">
<div class="logo-icon">{ }</div>
<h1><span>Daily</span>Works</h1>
</div>

<div class="meta" id="updated"></div>

</div>


<!-- main toggle: investments vs content -->
<div class="toggle-wrapper">

  <div class="toggle" id="mainBar">

    <div class="toggle-highlight" id="mainSlider"></div>

    <button class="toggle-item main-tab active" data-view="investments">
      <span class="icon">📈</span>
      <span>Investments</span>
    </button>

    <button class="toggle-item main-tab" data-view="content">
      <span class="icon">📰</span>
      <span>Content</span>
    </button>

  </div>

</div>

<!-- investments view -->
<div id="investmentsView" class="view active">
<div class="grid" id="marketGrid"></div>
</div>


<!-- content view -->
<div id="contentView" class="view">

<div class="tabs-wrap" style="margin-top:20px">
<div class="tabs" id="tabsBar">
<div class="tab-slider" id="tabSlider"></div>
<div class="tab sub-tab active" data-tab="anime"><span class="tab-icon">&#10024;</span>Anime</div>
<div class="tab sub-tab" data-tab="tech"><span class="tab-icon">&#9889;</span>Tech</div>
<div class="tab sub-tab" data-tab="java"><span class="tab-icon">&#9749;</span>Java</div>
</div>
</div>

<div id="anime" class="section active"></div>
<div id="tech" class="section"></div>
<div id="java" class="section"></div>

</div>


</div>


<script>

const REPO="kousikkaranam/daily-works"
const BRANCH="main"
const raw=(p)=>`https://raw.githubusercontent.com/${REPO}/${BRANCH}/${p}?t=${Date.now()}`

function parseMd(text){
return text.split(/\n## /).slice(1).map(s=>{
const lines=s.trim().split("\n")
return{
date:lines[0],
body:lines.slice(1).join("\n")
}
})
}

/* slider helper */

function initSlider(barId, sliderId, tabClass, onClick){
const sl=document.getElementById(sliderId)
const tabs=document.querySelectorAll("."+tabClass)

function move(el){
sl.style.left=el.offsetLeft+"px"
sl.style.width=el.offsetWidth+"px"
}

tabs.forEach(t=>{
t.onclick=()=>{
tabs.forEach(x=>x.classList.remove("active"))
t.classList.add("active")
move(t)
if(onClick) onClick(t)
}
})

requestAnimationFrame(()=>move(document.querySelector("."+tabClass+".active")))
window.addEventListener("resize",()=>move(document.querySelector("."+tabClass+".active")))
}

/* main toggle: investments <-> content */
initSlider("mainBar","mainSlider","main-tab",(t)=>{
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"))
document.getElementById(t.dataset.view+"View").classList.add("active")
/* re-init sub slider when content becomes visible */
if(t.dataset.view==="content"){
requestAnimationFrame(()=>{
const active=document.querySelector(".sub-tab.active")
if(active){
const sl=document.getElementById("tabSlider")
sl.style.left=active.offsetLeft+"px"
sl.style.width=active.offsetWidth+"px"
}
})
}
})

/* sub tabs: anime / tech / java */
initSlider("tabsBar","tabSlider","sub-tab",(t)=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(t.dataset.tab).classList.add("active")
})

/* investments */

async function loadMarket(){

const data=await (await fetch(raw("data/investments.json"))).json()

const latest=data[data.length-1]

document.getElementById("updated").textContent=
"Last update: "+latest.date+" "+latest.time

const assets=[
{name:"Reliance",key:"reliance_inr",p:"₹"},
{name:"TCS",key:"tcs_inr",p:"₹"},
{name:"Infosys",key:"infosys_inr",p:"₹"},
{name:"HDFC Bank",key:"hdfc_bank_inr",p:"₹"},
{name:"ICICI Bank",key:"icici_bank_inr",p:"₹"},
{name:"Bitcoin",key:"bitcoin_usd",p:"$"},
{name:"Ethereum",key:"ethereum_usd",p:"$"},
{name:"Gold (10g)",key:"gold_inr_10g",p:"₹"}
]

marketGrid.innerHTML=assets.map((a,i)=>{

const history=data.map(d=>d[a.key]).filter(Boolean)

return `
<div class="card">

<h3>${a.name}</h3>

<div class="price">
${a.p}${Number(latest[a.key]).toLocaleString()}
</div>

<canvas id="chart${i}" class="chart"></canvas>

</div>
`

}).join("")


assets.forEach((a,i)=>{

const history=data.map(d=>d[a.key]).filter(Boolean)

new Chart(
document.getElementById("chart"+i),
{
type:"line",
data:{
labels:history.map((_,i)=>i),
datasets:[{
data:history,
borderColor:"#3b82f6",
borderWidth:2,
pointRadius:0,
tension:.3
}]
},
options:{
plugins:{legend:{display:false}},
scales:{x:{display:false},y:{display:false}}
}
}
)

})

}

/* anime */

async function loadAnime(){

const items=parseMd(await (await fetch(raw("content/anime-quotes.md"))).text()).reverse()

const q=items[0].body.split("\n")

anime.innerHTML=

`
<div class="quote">
${q[0].replace(">","")}
<div class="attr">${q[1]||""}</div>
</div>
`

}

/* tech */

async function loadTech(){

const items=parseMd(await (await fetch(raw("content/tech-news.md"))).text()).reverse()

tech.innerHTML=

`<div class="news">`+

items.slice(0,10).map(n=>`

<div class="news-item">

<div>${n.body}</div>
<div>${n.date}</div>

</div>

`).join("")

+`</div>`

}

/* java */

async function loadJava(){

const items=parseMd(await (await fetch(raw("content/java-tips.md"))).text()).reverse()

java.innerHTML=

`
<div class="tip">
${items[0].body}
</div>
`

}

loadMarket()
loadAnime()
loadTech()
loadJava()

</script>

</body>
</html>
